<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://schedulerapi-production.up.railway.app; img-src 'self';">
  <title>Wrok — Manage Subscription</title>
  <meta name="theme-color" content="#0D7C66">
  <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0D7C66;
      --primary-light: #14A085;
      --primary-dark: #095E4E;
      --charcoal: #3C3C3C;
      --bg: #F4F7F9;
      --white: #FFFFFF;
      --gradient: linear-gradient(135deg, #2C3C3C 0%, #1A7A5A 30%, #0A8A8A 60%, #1976D2 100%);
      --error: #D32F2F;
      --warning: #F9A825;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--gradient);
      color: var(--white);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo { height: 36px; margin-bottom: 20px; }
    h1 { font-size: 2rem; font-weight: 900; margin-bottom: 8px; }
    .subtitle { color: rgba(255,255,255,0.7); font-size: 1rem; }

    /* Current plan card */
    .plan-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 24px;
    }
    .plan-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .plan-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .plan-row:last-child { border-bottom: none; }
    .plan-label { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
    .plan-value { font-weight: 600; font-size: 0.95rem; }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 700;
    }
    .status-active { background: rgba(76,175,80,0.2); color: #81C784; }
    .status-trial { background: rgba(249,168,37,0.2); color: #FFD54F; }
    .status-expired { background: rgba(211,47,47,0.2); color: #EF9A9A; }
    .status-cancelled { background: rgba(158,158,158,0.2); color: #BDBDBD; }

    /* Tier grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 24px 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
      cursor: pointer;
      position: relative;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      background: rgba(255,255,255,0.14);
    }
    .card.current {
      border: 2px solid rgba(255,255,255,0.4);
      cursor: default;
    }
    .card.current:hover { transform: none; box-shadow: none; }
    .card.selected {
      border: 2px solid var(--white);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
    }
    .card.disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .card.disabled:hover { transform: none; box-shadow: none; }

    .tier-name {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }
    .price {
      display: flex;
      align-items: flex-start;
      gap: 0;
      line-height: 1;
      margin-bottom: 8px;
    }
    .price-currency { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.8); margin-top: 4px; }
    .price-amount { font-size: 2.2rem; font-weight: 900; }
    .price-cents { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.8); margin-top: 4px; }
    .price-period { font-size: 0.8rem; color: rgba(255,255,255,0.5); align-self: flex-end; margin-bottom: 2px; }
    .worker-count {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 12px;
    }
    .current-badge {
      display: inline-block;
      background: var(--white);
      color: var(--primary-dark);
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 8px;
    }
    .popular-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      color: var(--white);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 8px;
    }

    .cta {
      display: block;
      width: 100%;
      text-align: center;
      padding: 12px 20px;
      background: rgba(255,255,255,0.15);
      color: var(--white);
      font-size: 0.88rem;
      font-weight: 700;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.25);
      text-decoration: none;
      transition: background 0.3s ease;
      cursor: pointer;
    }
    .cta:hover { background: rgba(255,255,255,0.25); }
    .cta.current-btn { opacity: 0.5; cursor: default; }

    /* Cancel section */
    .cancel-section {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .cancel-btn {
      display: inline-block;
      padding: 12px 32px;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .cancel-btn:hover {
      background: rgba(211,47,47,0.15);
      border-color: var(--error);
      color: #EF9A9A;
    }

    /* Confirm dialog */
    .dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .dialog-overlay.visible { display: flex; }
    .dialog-box {
      background: #2C3C3C;
      border-radius: 20px;
      padding: 32px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .dialog-box h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; }
    .dialog-box p { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5; }
    .dialog-actions { display: flex; gap: 12px; }
    .dialog-actions button {
      flex: 1;
      padding: 12px;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.15);
      color: var(--white);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.25); }
    .btn-danger {
      background: var(--error);
      color: var(--white);
    }
    .btn-danger:hover { background: #C62828; }
    .btn-primary {
      background: var(--white);
      color: var(--primary-dark);
    }
    .btn-primary:hover { background: rgba(255,255,255,0.9); }

    /* Loading & messages */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-overlay.visible { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.95rem; color: rgba(255,255,255,0.8); }

    .toast {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      z-index: 300;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .toast.visible { display: block; }
    .toast.error { background: var(--error); color: white; }
    .toast.success { background: #2E7D32; color: white; }

    .return-notice {
      text-align: center;
      margin-top: 32px;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
    }

    .init-loading {
      text-align: center;
      padding: 80px 0;
    }
    .init-loading .spinner { margin: 0 auto 16px; }

    .error-state {
      text-align: center;
      padding: 80px 0;
      color: rgba(255,255,255,0.7);
    }
    .error-state h2 { margin-bottom: 12px; }

    @media (max-width: 540px) {
      .grid { grid-template-columns: 1fr; max-width: 360px; margin-left: auto; margin-right: auto; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="wrok_logo.png" alt="Wrok" class="logo">
      <h1>Manage Subscription</h1>
      <p class="subtitle">Change your plan or manage your subscription</p>
    </div>

    <div id="initLoading" class="init-loading">
      <div class="spinner"></div>
      <span class="loading-text">Loading subscription...</span>
    </div>

    <div id="errorState" class="error-state" style="display:none">
      <h2>Unable to load subscription</h2>
      <p>Please try again from the app or check your internet connection.</p>
    </div>

    <div id="mainContent" style="display:none">
      <!-- Current plan -->
      <div class="plan-card" id="currentPlanCard"></div>

      <!-- Tier selection -->
      <div class="grid" id="tierGrid"></div>

      <!-- Cancel -->
      <div class="cancel-section" id="cancelSection" style="display:none">
        <button class="cancel-btn" id="cancelBtn">Cancel Subscription</button>
      </div>

      <p class="return-notice">Changes take effect immediately. Return to the app to continue.</p>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div class="dialog-overlay" id="confirmDialog">
    <div class="dialog-box">
      <h3 id="dialogTitle"></h3>
      <p id="dialogMessage"></p>
      <div class="dialog-actions">
        <button class="btn-secondary" id="dialogGoBack">Go Back</button>
        <button id="dialogAction" class="btn-danger"></button>
      </div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <span class="loading-text" id="loadingText">Processing...</span>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    'use strict';

    const API_BASE = 'https://schedulerapi-production.up.railway.app/api';
    const VALID_TIERS = ['STARTER', 'GROWTH', 'BUSINESS', 'ENTERPRISE'];
    const VALID_ACTIONS = ['cancel', 'change'];

    const TIERS = [
      { id: 'STARTER', name: 'Starter', price: '12', cents: '.99', maxWorkers: 10 },
      { id: 'GROWTH', name: 'Growth', price: '29', cents: '.99', maxWorkers: 20, popular: true },
      { id: 'BUSINESS', name: 'Business', price: '79', cents: '.99', maxWorkers: 50 },
      { id: 'ENTERPRISE', name: 'Enterprise', price: '139', cents: '.99', maxWorkers: 100 },
    ];

    let params = null;
    let subscription = null;
    let isProcessing = false;

    // ─── Input Validation & Param Parsing ─────────────────────

    function getParams() {
      // Read non-sensitive params from query string
      const query = new URLSearchParams(window.location.search);
      const workplaceId = query.get('workplaceId');
      const action = query.get('action');
      const tier = (query.get('tier') || '').toUpperCase();

      // Read JWT token from URL fragment (not sent in HTTP requests/referrer)
      let token = null;
      if (window.location.hash) {
        const hashParams = new URLSearchParams(window.location.hash.substring(1));
        token = hashParams.get('token');
      }

      return {
        workplaceId: workplaceId && /^\d+$/.test(workplaceId) ? workplaceId : null,
        token: token && token.length > 10 && token.length < 4096 ? token : null,
        action: VALID_ACTIONS.includes(action) ? action : null,
        tier: VALID_TIERS.includes(tier) ? tier : null,
      };
    }

    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + params.token,
      };
    }

    // ─── UI Helpers ───────────────────────────────────────────

    function showToast(msg, type) {
      type = type || 'error';
      const el = document.getElementById('toast');
      // Use textContent to prevent XSS
      el.textContent = typeof msg === 'string' ? msg.slice(0, 200) : 'An error occurred.';
      el.className = 'toast visible ' + type;
      setTimeout(function() { el.classList.remove('visible'); }, 5000);
    }

    function showLoading(visible, text) {
      document.getElementById('loadingOverlay').classList.toggle('visible', visible);
      if (text) document.getElementById('loadingText').textContent = text;
    }

    function showDialog(title, message, actionLabel, actionClass, onAction) {
      document.getElementById('dialogTitle').textContent = title;
      document.getElementById('dialogMessage').textContent = message;
      var btn = document.getElementById('dialogAction');
      btn.textContent = actionLabel;
      btn.className = actionClass;
      btn.onclick = function() { closeDialog(); onAction(); };
      document.getElementById('confirmDialog').classList.add('visible');
    }

    function closeDialog() {
      document.getElementById('confirmDialog').classList.remove('visible');
    }

    // ─── Safe DOM Builders ────────────────────────────────────

    function createEl(tag, className, textContent) {
      var el = document.createElement(tag);
      if (className) el.className = className;
      if (textContent) el.textContent = textContent;
      return el;
    }

    function renderCurrentPlan() {
      var sub = subscription;
      if (!sub) return;

      var statusClass = 'status-active';
      var statusLabel = '';
      if (sub.isTrial) { statusClass = 'status-trial'; statusLabel = 'Free Trial'; }
      else if (sub.status === 'ACTIVE') { statusClass = 'status-active'; statusLabel = 'Active'; }
      else if (sub.status === 'EXPIRED') { statusClass = 'status-expired'; statusLabel = 'Expired'; }
      else if (sub.status === 'CANCELLED') { statusClass = 'status-cancelled'; statusLabel = 'Cancelled'; }
      else { statusLabel = String(sub.status || '').slice(0, 30); }

      var tierInfo = TIERS.find(function(t) { return t.id === sub.tier; });
      var tierName = tierInfo ? tierInfo.name : String(sub.tier || '').slice(0, 30);
      var periodEnd = sub.currentPeriodEnd ? new Date(sub.currentPeriodEnd).toLocaleDateString() : '\u2014';

      var card = document.getElementById('currentPlanCard');
      // Clear safely
      card.textContent = '';

      var heading = createEl('h2', null, 'Current Plan');
      card.appendChild(heading);

      // Plan row
      var row1 = createEl('div', 'plan-row');
      row1.appendChild(createEl('span', 'plan-label', 'Plan'));
      row1.appendChild(createEl('span', 'plan-value', tierName));
      card.appendChild(row1);

      // Status row
      var row2 = createEl('div', 'plan-row');
      row2.appendChild(createEl('span', 'plan-label', 'Status'));
      row2.appendChild(createEl('span', 'status-badge ' + statusClass, statusLabel));
      card.appendChild(row2);

      // Workers row
      var row3 = createEl('div', 'plan-row');
      row3.appendChild(createEl('span', 'plan-label', 'Workers'));
      row3.appendChild(createEl('span', 'plan-value', sub.maxWorkers + ' max'));
      card.appendChild(row3);

      // Trial remaining
      if (sub.isTrial && sub.trialRemainingMs) {
        var days = Math.ceil(sub.trialRemainingMs / (1000 * 60 * 60 * 24));
        var row4 = createEl('div', 'plan-row');
        row4.appendChild(createEl('span', 'plan-label', 'Trial Remaining'));
        row4.appendChild(createEl('span', 'plan-value', days + ' days'));
        card.appendChild(row4);
      }

      // Renewal date
      if (sub.currentPeriodEnd && sub.status === 'ACTIVE' && !sub.isTrial) {
        var row5 = createEl('div', 'plan-row');
        row5.appendChild(createEl('span', 'plan-label', 'Renews on'));
        row5.appendChild(createEl('span', 'plan-value', periodEnd));
        card.appendChild(row5);
      }

      // Show cancel button only for active paid subscriptions
      if (sub.status === 'ACTIVE' && !sub.isTrial) {
        document.getElementById('cancelSection').style.display = '';
      }
    }

    function renderTierCards() {
      var grid = document.getElementById('tierGrid');
      grid.textContent = '';

      TIERS.forEach(function(tier) {
        var isCurrent = subscription && subscription.tier === tier.id && subscription.isActive;
        var card = createEl('div', 'card' + (isCurrent ? ' current' : ''));
        card.dataset.tier = tier.id;

        // Badges
        if (isCurrent) {
          card.appendChild(createEl('span', 'current-badge', 'Current Plan'));
          card.appendChild(document.createTextNode(' '));
        } else if (tier.popular) {
          card.appendChild(createEl('span', 'popular-badge', 'Most Popular'));
          card.appendChild(document.createTextNode(' '));
        }

        // Tier name
        card.appendChild(createEl('div', 'tier-name', tier.name));

        // Price row
        var priceDiv = createEl('div', 'price');
        var currSpan = createEl('span', 'price-currency');
        currSpan.innerHTML = '&euro;';
        priceDiv.appendChild(currSpan);
        priceDiv.appendChild(createEl('span', 'price-amount', tier.price));
        priceDiv.appendChild(createEl('span', 'price-cents', tier.cents));
        priceDiv.appendChild(createEl('span', 'price-period', '/mo'));
        card.appendChild(priceDiv);

        // Worker count
        card.appendChild(createEl('span', 'worker-count', 'Up to ' + tier.maxWorkers + ' workers'));

        // CTA button
        var btn = createEl('button', 'cta' + (isCurrent ? ' current-btn' : ''));
        btn.textContent = isCurrent ? 'Current Plan' : 'Switch to ' + tier.name;
        if (isCurrent) btn.disabled = true;
        card.appendChild(btn);

        if (!isCurrent) {
          card.addEventListener('click', function() { confirmTierChange(tier); });
        }

        grid.appendChild(card);
      });
    }

    // ─── Actions ──────────────────────────────────────────────

    function confirmTierChange(tier) {
      if (isProcessing) return;
      var isUpgrade = subscription && TIERS.findIndex(function(t) { return t.id === tier.id; }) >
                       TIERS.findIndex(function(t) { return t.id === subscription.tier; });
      var action = isUpgrade ? 'Upgrade' : 'Switch';

      showDialog(
        action + ' to ' + tier.name + '?',
        'Your plan will change immediately. The price difference will be prorated \u2014 you\u2019ll only pay the remaining portion at the new rate of \u20AC' + tier.price + tier.cents + '/mo.',
        action + ' to ' + tier.name,
        'btn-primary',
        function() { changeTier(tier.id); }
      );
    }

    async function changeTier(tierId) {
      if (isProcessing) return;
      if (!VALID_TIERS.includes(tierId)) return;
      isProcessing = true;
      showLoading(true, 'Changing plan...');

      try {
        var res = await fetch(API_BASE + '/subscriptions/change-tier', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            workplaceId: parseInt(params.workplaceId, 10),
            tier: tierId,
          }),
        });

        var data;
        try {
          data = await res.json();
        } catch (_) {
          throw new Error('Invalid server response.');
        }

        if (!res.ok) {
          showLoading(false);
          isProcessing = false;
          showToast(typeof data.error === 'string' ? data.error.slice(0, 200) : (typeof data.message === 'string' ? data.message.slice(0, 200) : 'Failed to change plan'));
          return;
        }

        showLoading(false);
        isProcessing = false;
        showToast('Plan changed successfully!', 'success');

        // Reload subscription
        await loadSubscription();
      } catch (err) {
        showLoading(false);
        isProcessing = false;
        showToast('Connection error. Please check your internet and try again.');
      }
    }

    function showCancelDialog() {
      if (isProcessing) return;
      showDialog(
        'Cancel Subscription?',
        'Your subscription will remain active until the end of the current billing period. After that, you won\u2019t have access to premium features.',
        'Cancel Subscription',
        'btn-danger',
        function() { cancelSubscription(); }
      );
    }

    async function cancelSubscription() {
      if (isProcessing) return;
      isProcessing = true;
      showLoading(true, 'Cancelling subscription...');

      try {
        var res = await fetch(API_BASE + '/subscriptions/cancel', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            workplaceId: parseInt(params.workplaceId, 10),
          }),
        });

        var data;
        try {
          data = await res.json();
        } catch (_) {
          throw new Error('Invalid server response.');
        }

        if (!res.ok) {
          showLoading(false);
          isProcessing = false;
          showToast(typeof data.error === 'string' ? data.error.slice(0, 200) : (typeof data.message === 'string' ? data.message.slice(0, 200) : 'Cancellation failed'));
          return;
        }

        showLoading(false);
        isProcessing = false;
        showToast('Subscription cancelled. Access continues until end of billing period.', 'success');

        await loadSubscription();
      } catch (err) {
        showLoading(false);
        isProcessing = false;
        showToast('Connection error. Please check your internet and try again.');
      }
    }

    async function loadSubscription() {
      try {
        var res = await fetch(API_BASE + '/subscriptions/workplace/' + encodeURIComponent(params.workplaceId), {
          headers: authHeaders(),
        });
        if (!res.ok) throw new Error('Failed to load subscription');
        subscription = await res.json();

        document.getElementById('initLoading').style.display = 'none';
        document.getElementById('mainContent').style.display = '';
        renderCurrentPlan();
        renderTierCards();
      } catch (err) {
        document.getElementById('initLoading').style.display = 'none';
        document.getElementById('errorState').style.display = '';
      }
    }

    // ─── Event Listeners (no inline onclick) ──────────────────

    document.getElementById('cancelBtn').addEventListener('click', showCancelDialog);
    document.getElementById('dialogGoBack').addEventListener('click', closeDialog);

    // ─── Init ─────────────────────────────────────────────────

    params = getParams();

    // Clean URL: remove query params and fragment to prevent token leakage
    if (window.history.replaceState) {
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    if (!params.workplaceId || !params.token) {
      document.getElementById('initLoading').style.display = 'none';
      document.getElementById('errorState').style.display = '';
      document.querySelector('#errorState p').textContent =
        'Missing authentication. Please open this page from the Wrok app.';
    } else {
      loadSubscription().then(function() {
        // Auto-trigger action if specified in URL
        if (params.action === 'cancel' && subscription && subscription.isActive) {
          showCancelDialog();
        } else if (params.action === 'change' && params.tier) {
          var tier = TIERS.find(function(t) { return t.id === params.tier; });
          if (tier) confirmTierChange(tier);
        }
      });
    }
  </script>
</body>
</html>
