<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wrok — Payment Successful</title>
  <meta name="theme-color" content="#0D7C66">
  <link rel="icon" href="favicon-32.png" type="image/png" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #0D7C66; --primary-light: #14A085; --charcoal: #3C3C3C; --bg: #F4F7F9; --white: #FFFFFF; }
    body { font-family: 'Roboto', sans-serif; background: var(--bg); color: var(--charcoal); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--white); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 48px 40px; max-width: 440px; width: 100%; text-align: center; }
    .logo { height: 40px; margin-bottom: 24px; }
    .check { width: 64px; height: 64px; background: #E8F5E9; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .check svg { width: 32px; height: 32px; color: #2E7D32; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; color: #2E7D32; }
    p { color: #555; font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
    .btn { display: inline-block; background: var(--primary); color: var(--white); border: none; border-radius: 100px; padding: 14px 32px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background 0.2s; text-decoration: none; }
    .btn:hover { background: var(--primary-light); }
  </style>
</head>
<body>
  <div class="card">
    <img src="wrok_logo.png" alt="Wrok" class="logo">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Payment Successful!</h1>
    <p>Your subscription is now active. You can close this page and return to the app.</p>
    <a href="https://alphacell1.github.io/website/" class="btn">Back to Wrok</a>
  </div>
</body>
</html>
